name: Build

# Compiles common + fabric + neoforge and publishes the jars as workflow artifacts
# (not a GitHub release). Runs on every branch push and can be started manually.
on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

# A newer push to the same ref cancels an in-flight build to save runner minutes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build all loaders
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build (common + fabric + neoforge)
        run: ./gradlew build --stacktrace

      - name: Upload Fabric jar
        uses: actions/upload-artifact@v4
        with:
          name: cobblesafari-fabric
          if-no-files-found: error
          path: |
            fabric/build/libs/*.jar
            !fabric/build/libs/*-sources.jar
            !fabric/build/libs/*-javadoc.jar

      - name: Upload NeoForge jar
        uses: actions/upload-artifact@v4
        with:
          name: cobblesafari-neoforge
          if-no-files-found: error
          path: |
            neoforge/build/libs/*.jar
            !neoforge/build/libs/*-sources.jar
            !neoforge/build/libs/*-javadoc.jar

      - name: Upload Common jar
        uses: actions/upload-artifact@v4
        with:
          name: cobblesafari-common
          if-no-files-found: error
          path: |
            common/build/libs/*.jar
            !common/build/libs/*-sources.jar
            !common/build/libs/*-javadoc.jar
