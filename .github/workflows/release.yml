name: Release

# Manually-triggered release: builds fresh (clean) jars for fabric + neoforge and
# publishes them as a GitHub release. Not run on push.
on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag (e.g. v0.3.0). Leave blank to derive from gradle.properties.'
        required: false
        type: string
      prerelease:
        description: 'Mark this release as a pre-release'
        required: false
        type: boolean
        default: false
      build_ref:
        description: 'Branch, tag, or commit SHA to build & release. Blank = the ref this run was launched from.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      # The workflow definition always comes from the ref this run was dispatched from
      # (which has this file); `build_ref` only changes which code gets checked out & built,
      # so you can release even commits/tags that predate these workflows.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.build_ref || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # clean guarantees the artifacts are built fresh from this commit.
      - name: Build fresh (clean + build)
        run: ./gradlew clean build --stacktrace

      - name: Resolve release tag
        id: meta
        env:
          INPUT_TAG: ${{ inputs.version_tag }}
        run: |
          GRADLE_VERSION="$(grep -E '^version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')"
          TAG="$INPUT_TAG"
          if [ -z "$TAG" ]; then TAG="v${GRADLE_VERSION}"; fi
          BUILT_SHA="$(git rev-parse HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$BUILT_SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG (gradle version: $GRADLE_VERSION, commit: $(git rev-parse --short HEAD))"

      - name: Stage loader jars
        run: |
          mkdir -p release-jars
          find fabric/build/libs neoforge/build/libs -maxdepth 1 -name '*.jar' \
            ! -name '*-sources.jar' ! -name '*-javadoc.jar' -exec cp -v {} release-jars/ \;
          echo "Staged jars:"
          ls -la release-jars

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
          BUILT_SHA: ${{ steps.meta.outputs.sha }}
        run: |
          FLAGS=(--title "CobbleSafari $TAG" --generate-notes --target "$BUILT_SHA")
          if [ "$PRERELEASE" = "true" ]; then
            FLAGS+=(--prerelease)
          fi
          gh release create "$TAG" release-jars/*.jar "${FLAGS[@]}"
