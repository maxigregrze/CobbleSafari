# SonarQube Cloud configuration for CobbleSafari
# Project: https://sonarcloud.io/project/overview?id=maxigregrze_CobbleSafari
sonar.projectKey=maxigregrze_CobbleSafari
sonar.organization=maxigregrze

# ---------------------------------------------------------------------------
# Issue exclusions
# ---------------------------------------------------------------------------
# The rules below are intentionally ignored because they conflict with standard
# Minecraft / Cobblemon modding conventions in this codebase. They are noise,
# not defects. Genuine code-quality issues are fixed in source instead.
#
#  S3008 - Registry / INSTANCE / MENU_TYPE fields use idiomatic UPPER_CASE names.
#  S1104 - Public fields on GSON-serialized config DTOs & registry holders are
#          intentional (required for (de)serialization / cross-mod access).
#  S1444 - Registry fields are assigned during register() and cannot be final.
#  S107  - MC render/registration methods & data-class constructors legitimately
#          take more than 7 parameters (engine-imposed signatures).
#  S100  - Mixin handler methods must use the "cobblesafari$" prefix convention.
#  S2696 - Static MenuType fields are assigned during loader initialization.
#  S1133 - Deprecated forwarding constructors/methods are kept intentionally.
#  S6548 - Singleton / enum-singleton patterns are deliberate here.
#  S6539 - "Monster class" (GtsService) - architectural, out of scope.
# ---------------------------------------------------------------------------
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9

sonar.issue.ignore.multicriteria.e1.ruleKey=java:S3008
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.java

sonar.issue.ignore.multicriteria.e2.ruleKey=java:S1104
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.java

sonar.issue.ignore.multicriteria.e3.ruleKey=java:S1444
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.java

sonar.issue.ignore.multicriteria.e4.ruleKey=java:S107
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.java

sonar.issue.ignore.multicriteria.e5.ruleKey=java:S100
sonar.issue.ignore.multicriteria.e5.resourceKey=**/mixin/**/*.java

sonar.issue.ignore.multicriteria.e6.ruleKey=java:S2696
sonar.issue.ignore.multicriteria.e6.resourceKey=**/*.java

sonar.issue.ignore.multicriteria.e7.ruleKey=java:S1133
sonar.issue.ignore.multicriteria.e7.resourceKey=**/*.java

sonar.issue.ignore.multicriteria.e8.ruleKey=java:S6548
sonar.issue.ignore.multicriteria.e8.resourceKey=**/*.java

sonar.issue.ignore.multicriteria.e9.ruleKey=java:S6539
sonar.issue.ignore.multicriteria.e9.resourceKey=**/*.java
